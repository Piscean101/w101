<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W101 Card Creator</title>
    <link href="./main.css" rel="stylesheet"/>
    <script src="./main.js" type="module"></script>
</head>
<body>

    <!--
    effect lib
-->

    <div id="hiddenEffectWrap" class="hidden">
        <button id="closeHiddenWindow">X</button>
        <div id="singleEffectField" class="hiddenEffectField">
            <h1 class="hiddenEffectHeader">Single Target Effects</h1>
            <div class="hiddenEffectLegend">
                <span class="hiddenEffectLegendName">Name</span>
                <span class="hiddenEffectLegendDesc">Description</span>
                <span>Pip Cost</span>
            </div>
        </div>
        <div id="massEffectField" class="hiddenEffectField">
            <h1 class="HiddenEffectHeader">Mass Target Effects</h1>
                <div class="hiddenEffectLegend">
                <span class="hiddenEffectLegendName">Name</span>
                <span class="hiddenEffectLegendDesc">Description</span>
                <span>Pip Cost</span>
            </div>
        </div>
    </div>

    <form action="" id="spellForm" class="page">
        <fieldset id="spellNameField">
            <legend>Spell Name & Cost</legend>
            <input type="text" id="spellNameInput" name="name">
            <br>
            <label for="spellCostInput">Pip Cost</label>
            <input id="spellCostInput" type="range" min="0" max="11" value="4">
            <span id="costTempDisplay" class="tempDisplay">4</span>
            
            <label for="shadowCostInput">Shadow Cost</label>
            <select id="shadowCostInput" name="shadowCost">
                <option value="0" checked>0</option>
                <option value="1">1</option>
                <option value="2">2</option>
            </select>
            <label for="schoolPIpInput">School Pip</label>
            <select id="schoolPipInput" name="schoolPip">
                <option value="none">--</option>
                <option value="Fire">Fire</option>
                <option value="Ice">Ice</option>
                <option value="Storm">Storm</option>
                <option value="Balance">Balance</option>
                <option value="Life">Life</option>
                <option value="Myth">Myth</option>
                <option value="Death">Death</option>
            </select>
        </fieldset>

        <fieldset id="spellSchoolField">
            <legend>Spell School</legend>

            <label for="schoolSelect">Primary School</label>
            <select id="schoolSelect" name="school">
                <option value="--">--</option>
                <option value="Fire" default>Fire</option>
                <option value="Ice">Ice</option>
                <option value="Storm">Storm</option>
                <option value="Life">Life</option>
                <option value="Death">Death</option>
                <option value="Myth">Myth</option>
                <option value="Balance">Balance</option>
                <option value="Sun">Sun</option>
                <option value="Moon">Moon</option>
                <option value="Star">Star</option>
                <option value="Shadow">Shadow</option>
            </select>

            <label for="spellTypeInput">Spell Type</label>
            <select id="spellTypeInput">
                <option value="false">--</option>
                <option value="Aoe">AoE</option>
                <option value="Aura">Aura</option>
                <option value="Charm">Charm</option>
                <option value="Damage">Damage</option>
                <option value="Drain">Drain</option>
                <option value="Enchantment">Enchantment</option>
                <option value="Global">Global</option>
                <option value="Heal">Heal</option>
                <option value="Manipulation">Manipulation</option>
                <option value="Ward">Ward</option>
                <option value="Weakness">Weakness</option>
            </select>

            <label for="loreCheck" id="loreLabel" title="Lore Spells have increased Damage/Healing but at a lower accuracy">LORE SPELL</label>
            <input type="checkbox" name="loreCheck" id="loreCheck">
            
        </fieldset>

        <!-- <fieldset id="spellCostField">
            <legend>Spell Cost</legend>
            <label for="spellCostInput">Pip Cost</label>
            <input id="spellCostInput" type="range" min="0" max="11" value="0">
            <span id="costTempDisplay" class="tempDisplay">0</span>
            <br><br>
            <label for="shadowCostInput">Shadow Cost</label>
            <select id="shadowCostInput" name="shadowCost">
                <option value="0" checked>0</option>
                <option value="1">1</option>
                <option value="2">2</option>
            </select>
        </fieldset> -->

        <fieldset id="addEffectField">
            <legend>Add Effects (max.5)</legend>

            <div id="effectCustomizer">

                <div id="customizerTopRow">
                    <fieldset id="chooseAoEField" class="customizer">
                        <legend class="smol">AoE?</legend>
                        <label for="chooseAoETrue">Yes</label>
                        <input type="radio" class="chooseAoE" name="chooseAoE" id="chooseAoETrue" value="true">
                        <label for="chooseAoEFalse">No</label>
                        <input type="radio" class="chooseAoE" name="chooseAoE" id="chooseAoEFalse" value="false" checked>
                    </fieldset>
                    <fieldset id="chooseOTField" class="customizer">
                        <legend class="smol">OverTime?</legend>
                        <label for="chooseOTTrue">Yes</label>
                        <input type="radio" class="chooseOT" name="chooseOT" id="chooseOTTrue" value="true">
                        <label for="chooseOTFalse">No</label>
                        <input type="radio" class="chooseOT" name="chooseOT" id="chooseOTFalse" value="false" checked>
                        <label for="chooseOTFalse">Deferred</label>
                        <input type="radio" class="chooseOT" name="chooseOT" id="chooseOTDef" value="def"><br>
                        <span id="chooseOTTimeWrap">
                            <input type="range" class="chooseOT" name="chooseOT" id="chooseOTTime" min="2" max="6" value="3">
                            <span id="OTTimeTemp">3</span>
                            Rounds
                        </span>
                    </fieldset>
                    <fieldset id="damageRangeField" class="customizer">
                        <legend class="smol">Damage Range</legend>
                        <select class="chooseRange" name="chooseRange" id="chooseDamageRange">
                            <option value="0">0</option>
                            <option value="40">40</option>
                            <option value="50">50</option>
                            <option value="60">60</option>
                            <option value="70">70</option>
                            <option value="80">80</option>
                            <option value="90">90</option>
                            <option value="100">100</option>
                            <option value="110">110</option>
                            <option value="120">120</option>
                            <option value="130">130</option>
                            <option value="140">140</option>
                            <option value="160">160</option>
                            <option value="200">200</option>
                        </select>
                    </fieldset>

                </div>

                <div id="customizerMiddleRow">

                    <fieldset id="chooseDiffField" class="customizer">
                        <legend class="smol">Divergent School?</legend>
                        <select id="diffSelect" name="diffSelect">
                            <option value="None">None</option>
                            <option value="Fire">Fire</option>
                            <option value="Ice">Ice</option>
                            <option value="Storm">Storm</option>
                            <option value="Life">Life</option>
                            <option value="Death">Death</option>
                            <option value="Myth">Myth</option>
                            <option value="Balance">Balance</option>
                            <option value="Drain">Drain</option>
                            <option value="Elemental">Elemental</option>
                            <option value="Spirit">Spirit</option>
                            <option value="Sun">Sun</option>
                            /** Myth Life Fire **/
                            <option value="Moon">Moon</option>
                            /** Ice Death Myth **/
                            <option value="Star">Star</option>
                            /** Life Death Storm **/
                        </select>
    
                    </fieldset>


                    <fieldset id="chooseExemption" class="customizer">
                        <legend class="smol">Ignore a modifier?</legend>
                        <label for="exemptaoe">AoE</label>
                        <input type="checkbox" id="exemptaoe" class="exemption">
                        <label for="exemptaoe">Weight</label>
                        <input type="checkbox" id="exemptweight" class="exemption">
                        <label for="exempteffect">Secondary Effects</label>
                        <input type="checkbox" id="exempteffect" class="exemption">
                    </fieldset>


                </div>

                <div id="customizerBottomRow">
                    <button id="addEffectDamage" class="addEffectButton bigUIBtn">Add Damage+</button>
                    <button id="addEffectHeal" class="addEffectButton bigUIBtn">Add Heal+</button><br>
                    <button id="addEffectSecondary" class="chooseEffectButton bigUIbtn">Choose Secondary Effects ></button>
                    <hr>
                    <button id="refreshSpell">REFRESH</button>
                </div>
                <hr>
                <button id="generateSpell">GENERATE SPELL</button>
                <button id="download">Download Image</button>
            </div>

        </Fieldset>
        
    </form>

    <div id="spellResult" class="page">

        <div id="spellImage">

            <div id="spellName">Spell Name</div>

            <div id="spellHeader">
                <!-- <div id="spellSchool" class="headerInfo">--</div> -->
                <img id="spellSchoolImg" class="hidden"/>
                <div id="spellCost" class="headerInfo">
                    <div id="spellCostPip">Choose a School and a Pip Cost</div>
                    <br>
                    <div id="spellCostShadow"></div>
                    <img id="spellCostSchoolPip" class="hidden"></img>
                </div>
                <div id="spellAccuracy" class="headerInfo">0%</div>
                <img id="spellType" class="headerInfo"/>
            </div>

            <div id="spellDesc">

            </div>

        </div>

    </div>

</body>
</html>
